name: Tests

on:
  # Reused as release.yml's verify gate (workflow_call). No push:[main] trigger —
  # main is covered once via that gate; PRs via pull_request below.
  workflow_call:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'RELEASING.md'
      - 'NOTES.md'
      - 'LICENSE'
      - 'SECURITY.md'
      - '.editorconfig'
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build types
        run: npm run build:types
